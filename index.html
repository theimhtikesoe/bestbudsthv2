<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#b6781e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Daily Reports" />
  <title>Daily POS Closing & Report System</title>
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=20260222" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=20260222" />
  <link rel="shortcut icon" href="/favicon-32x32.png?v=20260222" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="/styles.css?v=20260223b" />
</head>
<body>
  <header class="app-header py-4 mb-4">
    <div class="container">
      <div class="header-bar">
        <div class="brand-wrap">
          <img src="/DailyReports.png" alt="Daily Reports Logo" class="brand-logo" />
          <div class="brand-text">
            <h1 class="h3 mb-1">Daily POS Closing &amp; Report System</h1>
            <p class="mb-0 text-muted">Loyverse-integrated daily closing workflow</p>
          </div>
        </div>
        <a
          class="made-by-tag"
          href="https://rhyzoe-portfolio.vercel.app"
          target="_blank"
          rel="noopener noreferrer"
        >
          Made by Rhyzoe
        </a>
      </div>
    </div>
  </header>

  <main class="container pb-5">
    <div id="message" class="alert d-none" role="alert"></div>

    <section id="reportSection" class="card shadow-sm mb-4">
      <div class="card-body">
        <div class="d-flex flex-column flex-lg-row align-items-lg-end gap-3 mb-3">
          <div class="flex-grow-1">
            <label for="reportDate" class="form-label">Report Date</label>
            <input id="reportDate" type="date" class="form-control" />
          </div>
          <button id="syncButton" class="btn btn-primary no-export">Sync From Loyverse</button>
        </div>

        <div class="row g-3 mb-3 d-none">
          <div class="col-md-3">
            <label for="cashTotal" class="form-label">Cash Total</label>
            <input id="cashTotal" type="number" min="0" step="0.01" class="form-control" readonly />
          </div>
          <div class="col-md-3">
            <label for="cardTotal" class="form-label">Card Total</label>
            <input id="cardTotal" type="number" min="0" step="0.01" class="form-control" readonly />
          </div>
          <div class="col-md-3">
            <label for="totalOrders" class="form-label">Total Orders</label>
            <input id="totalOrders" type="number" min="0" step="1" class="form-control" readonly />
          </div>
          <div class="col-md-3">
            <label for="netSale" class="form-label">Net Sale</label>
            <input id="netSale" type="number" min="0" step="0.01" class="form-control" readonly />
          </div>
        </div>

        <div class="d-none">
          <h2 class="h5 mt-4 mb-3">Manual Inputs</h2>
          <input id="expense" type="hidden" />
          <input id="tip" type="hidden" />
          <input id="oneKBillCount" type="hidden" value="0" />
          <input id="openingCash" type="hidden" />
          <input id="actualCashCounted" type="hidden" />
        </div>

        <div class="d-none">
          <h2 class="h5 mt-4 mb-3">Auto Calculation</h2>
          <input id="expectedCash" type="hidden" />
          <input id="difference" type="hidden" />
          <input id="safeBoxApplied" type="hidden" />
        </div>

        <h2 class="h5 mt-4 mb-3">Order Payment Details</h2>
        <div class="row g-3">
          <div class="col-md-4">
            <div class="detail-box">
              <div class="detail-box-head">
                <span>Cash Entries</span>
                <strong id="cashEntriesTotal">฿0.00</strong>
              </div>
              <ol id="cashEntriesList" class="detail-list mb-0"></ol>
            </div>
          </div>
          <div class="col-md-4">
            <div class="detail-box">
              <div class="detail-box-head">
                <span>Card Entries</span>
                <strong id="cardEntriesTotal">฿0.00</strong>
              </div>
              <ol id="cardEntriesList" class="detail-list mb-0"></ol>
            </div>
          </div>
          <div class="col-md-4">
            <div class="detail-box">
              <div class="detail-box-head">
                <span>Discount Entries</span>
                <strong id="discountEntriesTotal">฿0.00</strong>
              </div>
              <ol id="discountEntriesList" class="detail-list mb-0"></ol>
            </div>
          </div>
        </div>

        <div class="d-none">
          <button id="saveButton"></button>
          <button id="printButton"></button>
          <button id="downloadImageButton"></button>
          <button id="downloadPdfButton"></button>
          <button id="loadButton"></button>
          <span id="unclassifiedHint"></span>
        </div>
      </div>
    </section>

    <section class="d-none">
      <input id="fromDate" type="hidden" />
      <input id="toDate" type="hidden" />
      <button id="filterReports"></button>
      <table id="reportsTable"><tbody></tbody></table>
    </section>

    <section class="d-none">
      <canvas id="netSalesChart"></canvas>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  <script src="/app.js?v=20260223d"></script>
</body>
</html>
