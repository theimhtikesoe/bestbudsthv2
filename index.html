<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="BestBuds' Daily Report - Daily POS Closing & Report System" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
  <meta name="apple-mobile-web-app-title" content="BestBuds Report" />
  
  <title>BestBuds' Daily Report</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="32x32" href="/logo.png?v=2" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico?v=2" />
  
  <!-- Apple Touch Icon for iOS -->
  <link rel="apple-touch-icon" href="/logo.png?v=2" />
  
  <!-- Android Chrome Icons -->
  <link rel="icon" type="image/png" sizes="192x192" href="/logo.png?v=2" />
  <link rel="icon" type="image/png" sizes="512x512" href="/logo.png?v=2" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/site.webmanifest" />
  
  <link rel="stylesheet" href="/styles.css?v=20260319i" />
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/logo.png" alt="BestBuds' Daily Report Logo" class="logo" />
      <div class="header-text">
        <h1>BestBuds' Daily Report</h1>
        <p>Daily POS Closing &amp; Report System</p>
      </div>
    </div>

    <div class="made-by">Made by Rhyzoe</div>

    <div id="message" class="alert d-none"></div>

    <div class="form-group">
      <label class="form-label">Report Date</label>
      <input id="reportDate" type="date" class="form-control" />
    </div>

    <button id="loadButton" class="btn btn-outline d-none">Load Saved Report</button>
    <button id="syncButton" class="btn btn-primary">Sync From Loyverse</button>

    <div class="form-group">
      <label class="form-label">Cash Total</label>
      <input id="cashTotal" type="text" class="form-control" readonly value="0.00" />
    </div>

    <div class="form-group">
      <label class="form-label">Card Total</label>
      <input id="cardTotal" type="text" class="form-control" readonly value="0.00" />
    </div>

    <div class="form-group">
      <label class="form-label">Transfer Total</label>
      <input id="transferTotal" type="text" class="form-control" readonly value="0.00" />
    </div>

    <div class="form-group">
      <label class="form-label">Total Orders</label>
      <input id="totalOrders" type="text" class="form-control" readonly value="0" />
    </div>

    <div class="form-group">
      <label class="form-label">Net Sale</label>
      <input id="netSale" type="text" class="form-control" readonly value="0.00" />
    </div>

    <h2 class="section-title">Order Payment Details</h2>

    <div class="detail-box">
      <div class="detail-box-head">
        <span>Cash Entries</span>
        <span id="cashEntriesTotal">THB 0.00</span>
      </div>
      <ul id="cashEntriesList" class="detail-list"></ul>
    </div>

    <div class="detail-box">
      <div class="detail-box-head">
        <span>Card Entries</span>
        <span id="cardEntriesTotal">THB 0.00</span>
      </div>
      <ul id="cardEntriesList" class="detail-list"></ul>
    </div>

    <div class="detail-box">
      <div class="detail-box-head">
        <span>Transfer Entries</span>
        <span id="transferEntriesTotal">THB 0.00</span>
      </div>
      <ul id="transferEntriesList" class="detail-list"></ul>
    </div>

    <div class="detail-box">
      <div class="detail-box-head">
        <span>Discount Entries</span>
        <span id="discountEntriesTotal">THB 0.00</span>
      </div>
      <ul id="discountEntriesList" class="detail-list"></ul>
    </div>

    <!-- Hidden elements to keep JS happy -->
    <div class="d-none">
      <div id="reportSection"></div>
      <button id="saveButton"></button>
      <button id="printButton"></button>
      <button id="downloadImageButton"></button>
      <button id="downloadPdfButton"></button>
      <input id="fromDate" type="date" />
      <input id="toDate" type="date" />
      <button id="filterReports"></button>
      <input id="expense" type="text" value="0" />
      <input id="tip" type="text" value="0" />
      <input id="oneKBillCount" type="number" value="0" />
      <input id="openingCash" type="text" value="0" />
      <input id="actualCashCounted" type="text" value="0" />
      <input id="expectedCash" type="number" value="0" />
      <input id="difference" type="number" value="0" />
      <input id="safeBoxApplied" type="text" value="0" />
      <div id="unclassifiedHint"></div>
      <table id="reportsTable"><tbody></tbody></table>
    </div>
  </div>

  <script src="/app.js?v=20260319j"></script>
</body>
</html>
